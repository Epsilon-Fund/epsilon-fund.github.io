<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — εpsilon{% else %}εpsilon{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>

  <div class="grid-overlay"></div>

  <div class="site-wrapper">
    <div class="site-content">

      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" class="nav-logo">
          <span>&epsilon;</span>psilon
        </a>
        <ul class="nav-links">
          {% for item in site.navigation %}
          <li>
            <a href="{{ item.url | relative_url }}"
               class="{% if page.url contains item.url and item.url != '/' %}active{% endif %}">
              {{ item.title }}
            </a>
          </li>
          {% endfor %}
        </ul>
        <button class="nav-toggle" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="footer-left">
          &epsilon;psilon — Fund Alpha In Development
        </div>
        <div class="footer-right">
          Systematic Crypto Research & Strategy
        </div>
      </footer>

    </div>
  </div>

<script>
  const toggle = document.querySelector('.nav-toggle');
  const links = document.querySelector('.nav-links');
  if (toggle) {
    toggle.addEventListener('click', () => links.classList.toggle('open'));
  }
</script>

</body>
</html>
