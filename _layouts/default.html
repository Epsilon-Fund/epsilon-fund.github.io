<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — εpsilon{% else %}εpsilon{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&subset=greek&display=swap" rel="stylesheet">
</head>
<body>

  <div class="grid-overlay"></div>

  <div class="site-wrapper">
    <div class="site-content">

      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" class="nav-logo"><svg width="9" height="11" viewBox="0 0 11 14" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle;margin-bottom:1px;margin-right:0;"><path d="M10 2.5C9 1.3 7.5 0.5 5.5 0.5C2.5 0.5 0.5 2.8 0.5 7C0.5 11.2 2.5 13.5 5.5 13.5C7.5 13.5 9 12.7 10 11.5M0.5 7H8.5" stroke="#4A9EFF" stroke-width="1.4" stroke-linecap="round"/></svg>PSILON</a>
        <ul class="nav-links">
          {% for item in site.navigation %}
          <li>
            <a href="{{ item.url | relative_url }}"
               class="{% if page.url contains item.url and item.url != '/' %}active{% endif %}">
              {{ item.title }}
            </a>
          </li>
          {% endfor %}
        </ul>
        <button class="nav-toggle" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="footer-left">
          εpsilon — Fund Alpha In Development
        </div>
        <div class="footer-right">
          Systematic Crypto Research & Strategy
        </div>
      </footer>

    </div>
  </div>

<script>
  const toggle = document.querySelector('.nav-toggle');
  const links = document.querySelector('.nav-links');
  if (toggle) {
    toggle.addEventListener('click', () => links.classList.toggle('open'));
  }
</script>

</body>
</html>
