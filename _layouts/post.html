---
layout: default
---

<div class="container--narrow">

  <div class="page-hero animate-in">
    <div class="post-meta" style="margin-bottom: 20px;">
      <span class="tag tag--{{ page.category }}">{{ page.category }}</span>
      <span class="label">{{ page.date | date: "%b %d, %Y" }}</span>
      {% if page.author %}
      <span class="label">— {{ page.author }}</span>
      {% endif %}
    </div>
    <h1>{{ page.title }}</h1>
    {% if page.excerpt %}
    <p class="hero-description">{{ page.excerpt }}</p>
    {% endif %}
  </div>

  <hr class="divider">

  <article class="post-content animate-in-delay-1">
    {{ content }}
  </article>

  <hr class="divider">

  <div style="display: flex; justify-content: space-between; align-items: center; padding: 20px 0;">
    <a href="/research/" class="label" style="color: var(--accent);">← Back to Research</a>
    <span class="label">&epsilon;psilon</span>
  </div>

</div>
