---
layout: default
---

<div class="container">
  <div class="page-hero animate-in">
    <span class="label">{{ page.label | default: "Epsilon Fund" }}</span>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p>{{ page.description }}</p>
    {% endif %}
  </div>

  <hr class="divider">

  <div class="post-content animate-in-delay-1">
    {{ content }}
  </div>
</div>
