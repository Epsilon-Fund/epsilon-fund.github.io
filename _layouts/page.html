---
layout: default
---

<div class="container">
  <div class="page-hero animate-in">
    <h1><span style="color: var(--accent);">{{ page.title | slice: 0 }}</span>{{ page.title | slice: 1, 100 }}</h1>
    {% if page.description %}
    <p style="margin-top: 8px;">{{ page.description }}</p>
    {% endif %}
  </div>

  <hr class="divider">

  <div class="post-content animate-in-delay-1">
    {{ content }}
  </div>
</div>
